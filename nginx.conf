server {
    listen 80;
    server_name localhost;

    # ── Compression ──────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/wasm
        image/svg+xml
        font/woff
        font/woff2;

    gzip_static on;

    # ── Security Headers ─────────────────────────────────────────────────────
    # Prevent clickjacking
    add_header X-Frame-Options "DENY" always;

    # Prevent MIME-type sniffing
    add_header X-Content-Type-Options "nosniff" always;

    # Control referrer information
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Disable unused browser features
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;

    # XSS protection (legacy browsers)
    add_header X-XSS-Protection "1; mode=block" always;

    # Content Security Policy — ajustado para Flutter Web / WASM
    # 'wasm-unsafe-eval' es requerido por el runtime WASM de Flutter
    add_header Content-Security-Policy "
        default-src 'self';
        script-src 'self' 'unsafe-inline' 'wasm-unsafe-eval';
        style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
        font-src 'self' https://fonts.gstatic.com data:;
        img-src 'self' data: blob: https://lh3.googleusercontent.com;
        connect-src 'self' https://api.katrix.com.ar wss://api.katrix.com.ar;
        worker-src 'self' blob:;
        manifest-src 'self';
        object-src 'none';
        base-uri 'self';
        frame-ancestors 'none';
    " always;

    # HSTS — descomentar cuando HTTPS esté activo en producción
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ── Routing ──────────────────────────────────────────────────────────────
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;

        # No-cache para archivos críticos de la PWA
        if ($request_uri ~* "(^/$|/index\.html|\.html|flutter_service_worker\.js|manifest\.json)") {
            add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
            expires off;
        }

        # Cache agresivo para assets estáticos versionados
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|wasm)$ {
            expires 1y;
            add_header Cache-Control "public, no-transform, immutable" always;
        }
    }
}
