<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="jc_organizadores">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>jc_organizadores</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <script>
    if ('serviceWorker' in navigator) {
      let refreshing = false;
      
      // Force page reload when a new service worker takes control
      navigator.serviceWorker.addEventListener('controllerchange', () => {
        if (!refreshing) {
          refreshing = true;
          console.log('[PWA] Nuevo Service Worker activado. Recargando página...');
          window.location.reload();
        }
      });

      const handleRegistration = (reg) => {
        if (!reg) return;

        // If there's already a waiting worker, skip waiting immediately
        if (reg.waiting) {
          console.log('[PWA] Service Worker en espera encontrado. Forzando actualización...');
          reg.waiting.postMessage('skipWaiting');
        }

        // Listen for new service worker installation
        reg.addEventListener('updatefound', () => {
          const installingWorker = reg.installing;
          if (installingWorker) {
            installingWorker.addEventListener('statechange', () => {
              if (installingWorker.state === 'installed') {
                console.log('[PWA] Nuevo Service Worker instalado. Forzando activación...');
                installingWorker.postMessage('skipWaiting');
              }
            });
          }
        });
      };

      // Check current registration
      navigator.serviceWorker.getRegistration().then(handleRegistration);

      // Regularly poll registration in case it is initialized late by flutter_bootstrap.js
      const interval = setInterval(() => {
        navigator.serviceWorker.getRegistration().then((reg) => {
          if (reg) {
            handleRegistration(reg);
            clearInterval(interval);
          }
        });
      }, 1000);
    }
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
