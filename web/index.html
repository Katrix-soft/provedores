<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="JC Organizadores">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="jc_organizadores">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <link rel="icon" type="image/png" href="favicon.png"/>
  <title>jc_organizadores</title>
  <link rel="manifest" href="manifest.json">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background-color: #1a1a2e;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: sans-serif;
      overflow: hidden;
    }

    #loading-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
      animation: fadeIn 0.4s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .logo-circle {
      width: 80px;
      height: 80px;
      border-radius: 20px;
      background: linear-gradient(135deg, #4f8ef7, #7c3aed);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 36px;
    }

    .app-name {
      color: #ffffff;
      font-size: 20px;
      font-weight: 600;
      letter-spacing: 0.5px;
    }

    .spinner {
      width: 36px;
      height: 36px;
      border: 3px solid rgba(255,255,255,0.15);
      border-top-color: #4f8ef7;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .loading-text {
      color: rgba(255,255,255,0.5);
      font-size: 13px;
    }

    #update-banner {
      display: none;
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      background: #4f8ef7;
      color: white;
      padding: 12px 24px;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 500;
      box-shadow: 0 4px 20px rgba(79,142,247,0.4);
      cursor: pointer;
      z-index: 9999;
      white-space: nowrap;
    }
  </style>
</head>
<body>

  <div id="loading-screen">
    <div class="logo-circle">📋</div>
    <div class="app-name">JC Organizadores</div>
    <div class="spinner"></div>
    <div class="loading-text">Cargando...</div>
  </div>

  <div id="update-banner" onclick="window.location.reload()">
    🔄 Nueva versión disponible — tocá para actualizar
  </div>

  <script>
    // Ocultar loading cuando Flutter arranca
    window.addEventListener('flutter-first-frame', () => {
      const screen = document.getElementById('loading-screen');
      if (screen) {
        screen.style.transition = 'opacity 0.3s ease';
        screen.style.opacity = '0';
        setTimeout(() => screen.remove(), 300);
      }
    });

    // Service Worker + auto-update con banner
    if ('serviceWorker' in navigator) {
      let refreshing = false;

      navigator.serviceWorker.addEventListener('controllerchange', () => {
        if (!refreshing) {
          refreshing = true;
          window.location.reload();
        }
      });

      const handleRegistration = (reg) => {
        if (!reg) return;

        if (reg.waiting) {
          document.getElementById('update-banner').style.display = 'block';
          reg.waiting.postMessage('skipWaiting');
        }

        reg.addEventListener('updatefound', () => {
          const worker = reg.installing;
          if (worker) {
            worker.addEventListener('statechange', () => {
              if (worker.state === 'installed' && navigator.serviceWorker.controller) {
                document.getElementById('update-banner').style.display = 'block';
                worker.postMessage('skipWaiting');
              }
            });
          }
        });
      };

      navigator.serviceWorker.getRegistration().then(handleRegistration);

      const interval = setInterval(() => {
        navigator.serviceWorker.getRegistration().then((reg) => {
          if (reg) { handleRegistration(reg); clearInterval(interval); }
        });
      }, 1000);
    }
  </script>

  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
